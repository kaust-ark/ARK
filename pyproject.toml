[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "ark-research"
version = "0.1.0"
description = "ARK - Automatic Research Kit: AI-powered idea-to-paper automation"
requires-python = ">=3.9"
dependencies = ["pyyaml>=6.0", "PyMuPDF>=1.24.0", "Pillow>=10.0.0"]

[project.optional-dependencies]
research = ["google-genai>=1.55.0"]
dashboard = ["fastapi>=0.104.0", "uvicorn[standard]>=0.24.0"]

[project.scripts]
ark = "ark.cli:main"

[tool.setuptools.packages.find]
include = ["ark*"]

[tool.setuptools.package-data]
ark = ["templates/**/*", "dashboard/static/**/*"]
